name: Manual Deploy

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend deps
        run: |
          cd backend
          npm ci
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

  deploy-backend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: |
          cd backend
          npm run build
          npm run prisma:generate || true

      - name: Deploy to Railway (optional)
        if: ${{ secrets.RAILWAY_TOKEN && secrets.RAILWAY_PROJECT_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Installing Railway CLI"
          curl -sSfL https://railway.app/install.sh | sh
          railway login --apiKey "$RAILWAY_TOKEN"
          # Deploy (requires project setup)
          railway up --project "$RAILWAY_PROJECT_ID" --detach || echo "Railway deploy step skipped or failed"

      - name: Push Docker image (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          cd backend
          docker build -t $DOCKERHUB_USERNAME/magelangverse-backend:latest .
          echo $DOCKERHUB_TOKEN | docker login --username $DOCKERHUB_USERNAME --password-stdin
          docker push $DOCKERHUB_USERNAME/magelangverse-backend:latest

  deploy-frontend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          prod: true
